name: Focus
options:
  bundleIdPrefix: com.focus
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.2"
  generateEmptyDirectories: true
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.4.1"

targets:
  Focus:
    type: application
    platform: macOS
    sources:
      - Focus
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.focus.app
        INFOPLIST_FILE: Focus/Info.plist
        CODE_SIGN_ENTITLEMENTS: Focus/Focus.entitlements
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: "NO"
        ENABLE_APP_SANDBOX: "NO"
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        SWIFT_STRICT_CONCURRENCY: complete
    dependencies:
      - package: GRDB
    entitlements:
      path: Focus/Focus.entitlements

  FocusHelper:
    type: tool
    platform: macOS
    sources:
      - FocusHelper
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.focus.helper
        INFOPLIST_FILE: FocusHelper/Info.plist
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: "NO"
        SWIFT_STRICT_CONCURRENCY: complete
        INSTALL_PATH: /Library/PrivilegedHelperTools

  FocusTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.focus.tests
        GENERATE_INFOPLIST_FILE: "YES"
    dependencies:
      - target: Focus

schemes:
  Focus:
    build:
      targets:
        Focus: all
        FocusHelper: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - FocusTests
